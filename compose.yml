services:
  mariadb:
    image: mariadb:11.2
    container_name: pointage_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - pointage_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: pointage:backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pointage_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_APP: app
      FLASK_ENV: production
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mariadb:3306/${MYSQL_DATABASE}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - pointage_network

  frontend:
    image: pointage:frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api/v1
        REACT_APP_LANGUAGE: ${REACT_APP_LANGUAGE:-en}
    container_name: pointage_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pointage_network

volumes:
  mariadb_data:

networks:
  pointage_network:
    driver: bridge
