<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Clock background -->
  <circle cx="16" cy="16" r="15" fill="#0d6efd" stroke="#fff" stroke-width="1"/>
  <!-- Clock face -->
  <circle cx="16" cy="16" r="12" fill="#fff"/>
  <!-- Hour markers -->
  <line x1="16" y1="5" x2="16" y2="8" stroke="#0d6efd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="27" stroke="#0d6efd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="16" x2="8" y2="16" stroke="#0d6efd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="27" y2="16" stroke="#0d6efd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="16" y1="16" x2="16" y2="10" stroke="#0d6efd" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="16" y1="16" x2="21" y2="16" stroke="#0d6efd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#0d6efd"/>
</svg>
